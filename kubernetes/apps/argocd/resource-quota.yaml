apiVersion: v1
kind: ResourceQuota
metadata:
  name: argocd-resource-quota
  namespace: argocd
spec:
  hard:
    # Increased quota to accommodate Argo CD server-side diff and controller resources
    requests.cpu: "1500m"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    pods: "15"
    persistentvolumeclaims: "5"
